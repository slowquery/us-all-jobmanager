# Loki(로그) + Tempo(트레이스) 데이터소스와, 로그 라인의 traceId → Tempo 트레이스로 이동하는
# derived field를 프로비저닝한다(06-observability-design.md "traceId 상호 이동" 확정 사항).

apiVersion: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"traceId":"([0-9a-f]{32})"'
          name: traceId
          url: '$${__value.raw}'
          urlDisplayLabel: "Tempo에서 보기"

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
        filterByTraceID: true
        tags: ["traceId"]
