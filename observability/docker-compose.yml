# 06-observability-design.md / 09-final-design.md 확정 스택의 로컬 구현체.
# 5개 서비스: app(대상 애플리케이션) · grafana · loki · tempo · alloy(로그 tail → Loki push).
# `docker compose -f observability/docker-compose.yml up -d`로 기동한다(observability/README.md 참조).

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    # grafana가 3000을 점유하므로 앱은 호스트 8080으로 노출한다(컨테이너 내부는 3000 유지).
    ports:
      - "8080:3000"
    environment:
      PORT: "3000"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4318"
      # news-digest 파이프라인 활성화용 설정. 비밀(GEMINI_API_KEY·SLACK_WEBHOOK_URL)은 리터럴로
      # 커밋하지 않고 호스트 환경변수에서만 보간 주입한다(PUBLIC repo, 값이 없으면 빈 문자열→비활성).
      NEWS_DIGEST_ENABLED: "${NEWS_DIGEST_ENABLED:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-}"
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"
      NEWS_FEED_URL: "${NEWS_FEED_URL:-}"
      NEWS_DIGEST_JOB_TITLE: "${NEWS_DIGEST_JOB_TITLE:-}"
      NEWS_DIGEST_TIMEOUT_MS: "${NEWS_DIGEST_TIMEOUT_MS:-}"
      NEWS_DIGEST_MAX_HEADLINES: "${NEWS_DIGEST_MAX_HEADLINES:-}"
    volumes:
      # logs.txt/jobs.json은 컨테이너 cwd(/app/run, Dockerfile 참조) 기준 상대 경로에 쓰인다.
      # alloy가 동일 볼륨을 read-only로 마운트해 logs.txt를 tail한다.
      - app-logs:/app/run
    depends_on:
      - tempo
    networks:
      - observability

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      # 로컬 관측 스택 확인 용도 — 익명 조회 허용(뷰어 권한)으로 로그인 없이 대시보드 확인 가능.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      # 익명 접근이 비활성화된 환경에서도 확인할 수 있도록 admin/admin도 함께 유지한다.
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
      - tempo
    networks:
      - observability

  loki:
    image: grafana/loki:3.2.1
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    networks:
      - observability

  tempo:
    image: grafana/tempo:2.6.1
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - observability

  alloy:
    image: grafana/alloy:v1.5.1
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - app-logs:/var/log/app:ro
    depends_on:
      - loki
    networks:
      - observability

  # news-digest 검증 전용 Slack 목(mock) 수신기. `profiles`로 게이팅해 기본 `up -d`(관측 5서비스)에는
  # 뜨지 않고, `--profile news-digest-verify` 지정 시에만 기동한다. app이 SLACK_WEBHOOK_URL로
  # http://slack-mock:9090/webhook 을 POST하면 다이제스트 "결과 문구"를 stdout에 기록한다(즉시 200 OK).
  slack-mock:
    image: node:24-slim
    profiles:
      - news-digest-verify
    command: ["node", "/srv/catcher.mjs"]
    volumes:
      - ../scripts/slack-mock-catcher.mjs:/srv/catcher.mjs:ro
    networks:
      - observability

volumes:
  app-logs:
  loki-data:
  tempo-data:

networks:
  observability:
    driver: bridge
