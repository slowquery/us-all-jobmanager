name: admin-ui freshness
# 권위 있는 신선도 게이트(Rule 7). 로컬 .githooks/pre-push는 빠른 피드백일 뿐이며,
# GitHub squash 머지는 로컬 훅을 타지 않으므로 커밋된 public/이 admin-ui 소스와
# 일치하는지 여기서 최종 검증한다.
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
permissions:
  contents: read
jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: admin-ui 빌드 후 public/ 신선도 검증
        run: |
          set -euo pipefail
          if [ ! -d admin-ui ]; then
            echo "admin-ui 디렉터리 없음 — 신선도 게이트 건너뜀."
            exit 0
          fi
          corepack enable
          if [ -f admin-ui/yarn.lock ]; then
            yarn --cwd admin-ui install --immutable
          elif [ -f admin-ui/package-lock.json ]; then
            npm ci --prefix admin-ui
          else
            echo "::error::admin-ui 잠금 파일(yarn.lock/package-lock.json)이 커밋되어 있어야 합니다 (재현 가능 빌드)."
            exit 1
          fi
          if [ -f admin-ui/yarn.lock ]; then
            yarn --cwd admin-ui build
          else
            npm run --prefix admin-ui build
          fi
          if [ -n "$(git status --porcelain -- public)" ]; then
            echo "::error::public/ 가 최신 admin-ui 빌드와 다릅니다 — 'yarn build:admin' 실행 후 public/ 을 커밋하세요."
            git --no-pager diff --stat -- public || true
            git status --porcelain -- public
            exit 1
          fi
          echo "admin-ui 빌드 신선도 확인: 커밋된 public/ 이 최신입니다."
