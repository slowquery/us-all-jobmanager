name: CI
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: corepack enable
      - run: yarn install --immutable
      - name: Lint
        run: yarn lint
      - name: Build
        run: yarn build
      - name: Unit tests
        run: |
          if node -e "p=require('./package.json');process.exit(p.scripts&&p.scripts.test?0:1)"; then
            yarn test
          else
            echo "::warning::'test' 스크립트 미정의 — unit 테스트 미구현(구현 시 필수)"
          fi
      - name: E2E tests
        run: |
          if node -e "p=require('./package.json');process.exit(p.scripts&&p.scripts['test:e2e']?0:1)"; then
            yarn test:e2e
          else
            echo "::warning::'test:e2e' 스크립트 미정의 — e2e 테스트 미구현(구현 시 필수)"
          fi
